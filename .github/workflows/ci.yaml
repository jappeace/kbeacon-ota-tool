# CI layout follows jappeace/prrrrrrrrr: one Linux job for every
# compilation target (plus unit tests via the native check phase), one
# Linux job that boots an Android emulator and drives the app's UI
# against simulated bluetooth signals (hatter's netsim + bumble
# setup), and one macOS job for the iOS library and Xcode staging.
on:
  pull_request:
  push:
    branches:
      - master

permissions:
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        df -h
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
          # Same substitution hardening as hatter's CI: the self-hosted
          # cache has dropped multi-GB NARs mid-stream over HTTP/2.
          http2 = false
          download-attempts = 10
    - name: Build all targets (native + tests, Android .so both archs, APK, linters)
      run: nix-build nix/ci.nix -A all-builds -o result
    - name: Upload APK
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: kbeacon-ota-apk
        path: result/apk/kbeacon-ota.apk
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

  android-emulator-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        df -h
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
          http2 = false
          download-attempts = 10
    - name: Enable KVM for the Android emulator
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Build the emulator UI test
      run: nix-build nix/emulator-ui.nix -o result-emulator-ui
    - name: Run the UI test against simulated bluetooth signals
      run: |
        set -o pipefail
        ./result-emulator-ui/bin/test-ui 2>&1 | tee /tmp/ui-test.log
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
          http2 = false
          download-attempts = 10
    - name: Build iOS library (simulator)
      run: nix-build nix/ci.nix -A ios-simulator
    - name: Build iOS library (device)
      run: nix-build nix/ci.nix -A ios-lib
    - name: Stage iOS Xcode project
      run: nix-build nix/ci.nix -A ios-app
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}
