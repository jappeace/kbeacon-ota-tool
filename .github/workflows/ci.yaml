on:
  pull_request:
  push:
    branches:
      - master

permissions:
  actions: write

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
    - name: Nix store cache
      uses: nix-community/cache-nix-action@v6
      with:
        primary-key: nix-${{ hashFiles('nix/sources/sources.json', 'nix/*.nix', 'default.nix', '*.cabal') }}
        restore-prefixes-first-match: nix-
    - name: Build APK
      run: nix-build nix/apk.nix -o result-apk
    - name: Upload APK
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: kbeacon-ota-apk
        path: result-apk/kbeacon-ota.apk
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}
